<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Declaration of Independence</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Elegant fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>

<div class="page">

  <div class="paper">

    <!-- TITLE -->
    <div class="title">The Declaration of Independence</div>

    <div class="subtitle">
      Sign your name in affirmation of the founding principles
    </div>

    <!-- DECLARATION IMAGE -->
    <img class="declarationImage"
         src="https://upload.wikimedia.org/wikipedia/commons/0/07/United_States_Declaration_of_Independence.jpg"/>

    <!-- INPUT -->
    <div class="inputRow">
      <input id="nameInput" placeholder="Enter your full name"/>
      <button onclick="beginSigning()">Sign the Declaration</button>
    </div>

    <!-- SIGNING AREA -->
    <div id="signatureScene" class="hidden">

      <div class="signatureArea">

        <img class="quill" id="quill"
             src="https://pngimg.com/d/quill_PNG49.png"/>

        <div class="signature" id="signature"></div>

        <div class="signatureLine"></div>

      </div>

      <!-- PRINCIPLES -->
      <div class="principles">

        <div class="principlesTitle">Select a Principle to Reflect On</div>

        <div class="buttons">
          <button onclick="showQuote('liberty')">Liberty</button>
          <button onclick="showQuote('equality')">Equality</button>
          <button onclick="showQuote('rights')">Rights</button>
          <button onclick="showQuote('government')">Government</button>
        </div>

        <div class="quoteBox" id="quoteBox">
          “Select a principle to reveal a passage from the Declaration of Independence.”
        </div>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Sign the Declaration</title> <link rel="stylesheet" href="style.css"/> <!-- Fonts --> <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet"> <!-- GSAP Animation Library --> <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script> <!-- html2canvas --> <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script> <!-- jsPDF --> <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf.umd.min.js"></script> </head> <body> <!-- Background Overlay --> <div class="backgroundOverlay"></div> <!-- Main Container --> <div class="container"> <!-- Main Parchment --> <div class="paper"> <!-- Decorative Burn Edge --> <div class="burnOverlay"></div> <!-- Title --> <h1> Sign the Declaration </h1> <!-- Subtitle --> <p class="subtitle"> Add your name in support of liberty, equality, and self-government. </p> <!-- Declaration Section --> <div class="declarationSection" id="declarationSection"> <!-- Historic Declaration Image --> <img class="declarationImage" id="declarationImage" src="https://upload.wikimedia.org/wikipedia/commons/0/07/United_States_Declaration_of_Independence.jpg" alt="Declaration of Independence" /> <!-- Splitting Animation Panels --> <div class="splitLeft" id="splitLeft"></div> <div class="splitRight" id="splitRight"></div> </div> <!-- Signing Input --> <div class="inputSection"> <input type="text" id="nameInput" placeholder="Enter your full name" /> <br> <button onclick="beginSigning()"> Sign the Declaration </button> </div> <!-- Signing Scene --> <div class="signatureScene hidden" id="signatureScene"> <!-- Signature Paper --> <div class="signaturePaper"> <!-- Quill --> <img class="quill" id="quill" src="https://upload.wikimedia.org/wikipedia/commons/5/59/Quill_and_ink.svg" alt="Quill Pen" /> <!-- Signature Line --> <div class="signatureLine"></div> <!-- Signature --> <div class="signature" id="signature"></div> </div> <!-- Principles --> <div class="principles"> <h2> Principles of the Declaration </h2> <!-- Principle Buttons --> <div class="principleButtons"> <button onclick="showQuote('liberty')"> Liberty </button> <button onclick="showQuote('equality')"> Equality </button> <button onclick="showQuote('rights')"> Natural Rights </button> <button onclick="showQuote('government')"> Self-Government </button> </div> <!-- Quote Box --> <div class="quoteBox" id="quoteBox"> Select a principle to reveal a passage from the Declaration of Independence. </div> </div> <!-- Certificate Button --> <button class="certificateBtn" onclick="downloadCertificate()"> Download Official Certificate </button> </div> </div> </div> <!-- JavaScript --> <script src="script.js"></script> </body> </html>

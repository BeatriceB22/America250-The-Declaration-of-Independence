<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Declaration Signing</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>

<div class="container">

  <div class="paper">

    <h1>The Declaration of Independence</h1>

    <p class="subtitle">Sign your name in affirmation of the founding principles</p>

    <!-- DECLARATION IMAGE -->
    <div class="imageBox">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/07/United_States_Declaration_of_Independence.jpg"
           class="declarationImage"/>
    </div>

    <!-- INPUT -->
    <div class="inputSection">
      <input id="nameInput" type="text" placeholder="Enter your full name"/>
      <button onclick="beginSigning()">Sign the Declaration</button>
    </div>

    <!-- SIGNING AREA -->
    <div id="signatureScene" class="hidden">

      <div class="signaturePaper">

        <!-- QUILL -->
        <img class="quill" id="quill"
             src="https://upload.wikimedia.org/wikipedia/commons/5/59/Quill_and_ink.svg"/>

        <!-- SIGNATURE (NOW ABOVE LINE) -->
        <div class="signature" id="signature"></div>

        <!-- LINE (BELOW SIGNATURE) -->
        <div class="signatureLine"></div>

      </div>

      <!-- PRINCIPLES -->
      <div class="principles">

        <h2>Principles</h2>

        <button onclick="showQuote('liberty')">Liberty</button>
        <button onclick="showQuote('equality')">Equality</button>
        <button onclick="showQuote('rights')">Rights</button>
        <button onclick="showQuote('government')">Government</button>

        <div class="quoteBox" id="quoteBox">
          Select a principle above.
        </div>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
